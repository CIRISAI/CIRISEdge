[build-system]
requires = ["maturin>=1.5,<2"]
build-backend = "maturin"

[project]
name = "ciris-edge"
description = "Reticulum-native federation transport for the CIRIS stack"
readme = "README.md"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "CIRIS AI", email = "hello@ciris.ai" }]
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Topic :: Communications",
    "Topic :: System :: Networking",
]
# v0.2.0 тАФ pip-install-time subsumption mirroring persist's pattern.
# `pip install ciris-edge` pulls `ciris-persist` (which transitively
# pulls `ciris-verify` and the `ciris-build-sign` /
# `ciris-build-verify` console_scripts onto PATH). Lens / agent /
# registry get one install command for the whole edge+persist+verify
# stack.
#
# Pin to >=1.1.2 because that's the polymorphic-Pipeline cut
# (CIRISPersist#33 Path A bounded): `Pipeline<E: WireEnvelope>` +
# `InlineTextEnvelope` + `default_speak_pipeline` factory тАФ edge's
# `send_inline` / `send_durable_inline` invoke this for outbound
# SPEAK / LLM-prompt / WBD-body transit-touch. Also folds in the
# substrate constructors (CIRISPersist#43) edge's
# `EdgeBuilder::from_keyring_seed_dir` calls for sovereign-mode
# Reticulum adoption.
#
# Pin to <2 because we expect persist to follow semver-major on
# breaking changes; v0.2.x edge consumes v1.x persist. Bump the
# upper bound when v0.3.x edge coordinates with v2.x persist.
# v0.2.4 тАФ pin floor bumped to >=1.8.1, the CIRIS 3.0 in-process
# cohabitation convergence pin (CIRISPersist#85 EPIC). All co-resident
# consumers (agent + NodeCore + LensCore + edge) must link one
# identical ciris-persist version to share the OnceLock-backed Engine
# process-singleton; two crate versions = two Engine types = cannot
# share the singleton. v1.6.8 shipped the singleton + deadlock fix
# (CIRISPersist#75); v1.7.x added the consumer registry + occurrence
# registration; v1.8.x continues the convergence set. Verify pin
# unchanged at v2.4.0. Closes CIRISEdge#10.
dependencies = [
    "ciris-persist>=1.8.1,<2",
]
dynamic = ["version"]

[project.urls]
Homepage = "https://ciris.ai"
Repository = "https://github.com/CIRISAI/CIRISEdge"
Issues = "https://github.com/CIRISAI/CIRISEdge/issues"

[tool.maturin]
features = ["pyo3"]
module-name = "ciris_edge"
# abi3-py311 тАФ one wheel covers Python 3.11+ per the same matrix
# precedent persist + verify use. CIRISEdge ships three platform
# wheels: linux-x86_64, linux-aarch64, darwin-aarch64 (darwin-x86_64
# omitted per GitHub Actions Intel macOS runner capacity issues тАФ
# matches persist's matrix exactly).
python-source = "python"
strip = true
