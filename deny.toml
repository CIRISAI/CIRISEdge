# cargo-deny config — enforces MISSION.md §6 license-locked mission
# preservation. Inherits the dep-tree concerns persist + verify
# already curated; CIRISEdge transitively pulls the same trees.

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    # MIT-0 (MIT No Attribution) — strictly more permissive than MIT
    # (no attribution requirement); AGPL-compatible. Transitive via
    # ciris-persist v2.7.0's jsonschema dep (CIRISPersist#102 Ask 4
    # envelope-schema admission): `borrow-or-share` → `fluent-uri` →
    # `referencing` → `jsonschema` → persist. Same rationale persist's
    # own deny.toml documents.
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "OpenSSL",
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "CC0-1.0",
    # webpki-roots 0.26+ — CDLA-Permissive-2.0 (Linux Foundation's
    # Community Data License Agreement, permissive variant). AGPL-
    # compatible: distribution permitted, no patent-grant requirement,
    # attribution preserved. Transitive via ciris-verify-core's
    # reqwest/ureq stack — same finding persist v0.1.9 documented.
    "CDLA-Permissive-2.0",
    # bzip2 — the bzip2/libbzip2 license (BSD-style, permissive: use,
    # redistribution, and modification permitted with attribution; no
    # copyleft). AGPL-compatible. Transitive via the Leviculum
    # Reticulum stack (reticulum-core resource-layer compression).
    "bzip2-1.0.6",
    # MIT-0 — "MIT No Attribution" (OSI-approved, strictly more
    # permissive than MIT: no attribution requirement). AGPL-compatible.
    # Transitive via persist v2.7.0's jsonschema admission gates
    # (CIRISEdge#20 persist bump) → fluent-uri → borrow-or-share.
    "MIT-0",
]
confidence-threshold = 0.85

[bans]
# v0.1.0-pre1 — `allow` not `warn` because cargo-deny's bans check
# treats `warn` as a hard fail despite the docs. Edge's tree pulls
# duplicate transitive deps via the secret-service / zbus / pyo3 /
# axum stacks (mostly two-versions splits across async-io,
# async-lock, base64, getrandom, hashbrown, etc.) — all transitive
# through ciris-keyring + the web-stack additions, none on edge's
# verify hot path. Dedup pass when the dep tree stabilizes.
# TODO: flip back to "warn" or "deny" once the upstream stacks
# converge on single versions of the common transitives.
multiple-versions = "allow"
wildcards         = "deny"

[advisories]
yanked = "warn"
# Inherited ignores from CIRISPersist's deny.toml — same dep tree, same
# transitive-only exposure. None of these advisories touch CIRISEdge's
# verify-and-dispatch hot path (persist owns the DB / DNS / TLS
# surfaces).
ignore = [
    "RUSTSEC-2024-0388",  # derivative unmaintained (via ciris-keyring TPM derive stack)
    "RUSTSEC-2024-0384",  # instant unmaintained (Phase 3 Reticulum may obsolete)

    # rustls / webpki / DNS branch — transitive via ciris-verify-core's
    # verification stack. Persist's deny.toml documents the rationale;
    # edge inherits.
    "RUSTSEC-2026-0119",  # hickory-proto DNS encoding O(n²); edge has no DNS encode path
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained
    "RUSTSEC-2026-0098",  # rustls-webpki URI-name constraint (no URI SAN validation here)
    "RUSTSEC-2026-0099",  # rustls-webpki wildcard-DNS constraint (no name-constraint certs)
    "RUSTSEC-2026-0104",  # rustls-webpki CRL parse panic (no CRL parsing here)

    # v0.11.0 — `unic-*` family unmaintained. Transitive via
    # `pyo3-stub-gen` → `askama` → `unic-emoji-char` (Unicode emoji
    # property tables). The crates are read-only Unicode data; the
    # maintenance gap doesn't expose us to a vulnerability path. They
    # ship in dev-deps (stub_gen bin) only, not the production wheel.
    "RUSTSEC-2025-0075",  # unic-* unmaintained
    "RUSTSEC-2025-0080",  # unic-* unmaintained
    "RUSTSEC-2025-0081",  # unic-* unmaintained
    "RUSTSEC-2025-0090",  # unic-* unmaintained
    "RUSTSEC-2025-0098",  # unic-* unmaintained
    "RUSTSEC-2025-0100",  # unic-* unmaintained

    # v3.0.0 (CIRISEdge#89) — the pyo3 0.28 → 0.29 family lockstep
    # landed. RUSTSEC-2026-0176 + RUSTSEC-2026-0177 are GONE from the
    # tree (pyo3 0.29 ships both fixes); the ignores that lived here
    # since v2.1.1 are removed. If `cargo deny check advisories`
    # surfaces either again, something regressed the substrate pin.

    # v3.8.0 (CIRISEdge#66 / PR #131) — openmls 0.8.1 + libcrux
    # ciphersuite 0x004D (MLS_256_XWING_CHACHA20POLY1305_SHA256_Ed25519,
    # X-Wing PQ-hybrid). Cryspen's libcrux family has four open
    # advisories — all non-exploitable in our usage pattern; each
    # ignore documents why.
    "RUSTSEC-2026-0124",  # libcrux-chacha20poly1305: panic when
    # `encrypt(ptxt, ciphertext_buffer)` is called with
    # `ciphertext_buffer.len() > ptxt.len() + TAG_LEN`. NOT exploitable
    # in our tree: openmls's libcrux-backed AEAD wrapper sizes the
    # output buffer at exactly `ptxt.len() + TAG_LEN`; the buffer
    # length is never attacker-controlled at our wire layer. The
    # realtime_av path uses ring-backed AES-256-GCM (not libcrux's
    # ChaCha20-Poly1305); the libcrux ChaCha lane runs only inside
    # openmls's internal HPKE wrap for the X-Wing combiner.
    "RUSTSEC-2026-0075",  # libcrux-ed25519 keygen samples Ed25519
    # secret keys in a loop for ≤100 attempts; on catastrophic CSPRNG
    # failure (100 consecutive zero samples) it silently continues
    # with an all-zero key. P(100 zero samples | working CSPRNG)
    # ≈ 2^-2000. OS-level CSPRNG failure is the threat model edge
    # already addresses at the federation_session layer via
    # ciris-crypto's RNG fail-secure latch (CIRISVerify #74, v5.6.0
    # RC7). The libcrux-ed25519 keygen here is openmls-internal MLS
    # signature key minting, not edge's federation signing path.
    "RUSTSEC-2026-0073",  # libcrux-poly1305 standalone MAC panic
    # via incorrect key-length constant. Per the advisory's own
    # impact note: "use of libcrux-poly1305 in libcrux-chacha20poly1305
    # is unaffected." We use it only via openmls's internal HPKE
    # wrap (libcrux-chacha20poly1305 path), never as a standalone MAC.
    "RUSTSEC-2026-0173",  # proc-macro-error2 unmaintained.
    # Build-time dev-dep only (procedural-macro support crate); ships
    # in zero production binaries. Pulled transitively via openmls's
    # macro stack. Migration to manyhow / proc-macro2-diagnostics is
    # openmls-upstream's call.
]

[sources]
unknown-registry = "deny"
unknown-git      = "warn"
# v0.1.0-pre1 — persist + verify ship as `publish = false` Rust
# crates pulled via git tag. allow-list explicitly until they're on
# crates.io (or a private registry).
allow-git = [
    "https://github.com/CIRISAI/CIRISPersist",
    "https://github.com/CIRISAI/CIRISVerify",
]
